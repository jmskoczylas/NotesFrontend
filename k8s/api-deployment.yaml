apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-api
  namespace: notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-api
  template:
    metadata:
      labels:
        app: notes-api
    spec:
      containers:
        - name: notes-api
          image: ghcr.io/your-org/notes-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Db__Provider
              value: Sqlite
            - name: ConnectionStrings__Default
              value: Data Source=/data/notes.db
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: notes-api-data
              mountPath: /data
      volumes:
        - name: notes-api-data
          persistentVolumeClaim:
            claimName: notes-api-data
