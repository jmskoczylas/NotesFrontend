services:
  api:
    build:
      context: ../NotesMicroservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Db__Provider: Sqlite
      ConnectionStrings__Default: Data Source=/data/notes.db
    ports:
      - "1998:8080"
    volumes:
      - notes-api-data:/data

  frontend:
    build:
      context: .
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  notes-api-data:
